  <rect width="1600" height="900" fill="url(#g)" opacity=".72"/>
  <text x="110" y="120" fill="#f7f2e9" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="700">AIUI</text>
  <text x="112" y="170" fill="#a9bed0" font-family="Arial, Helvetica, sans-serif" font-size="24">Long-term dialogue / spatio-temporal RAG / intent-driven agents</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <circle cx="785" cy="450" r="120" fill="#101724" stroke="#b7dbf4" stroke-width="3"/>
